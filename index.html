<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<!-- リセットCSS -->
<link rel="stylesheet" href="https://unpkg.com/ress/dist/ress.min.css">
<title>ポーカーチップ</title>
<style>
body {
  font-family: sans-serif;
  text-align: center;
  background: #0b3d2e;
  color: white;
  overflow: hidden;
}

#setup {
  padding-top: 40px;
}

input{
  color: #fff;
  text-align: center;
  border-radius: 10px;
  background-color: initial;
  border: 2px solid #fff;
  margin-bottom: 20px;
}

button{
  color: #fff;
  text-align: center;
  background-color: initial;
  border-radius: 10px;
  border: 2px solid #fff;
  padding: 10px 20px;
  margin: 10px;
  font-size: 16px;
}

#game {
  display: flex;
  flex-direction: column;
  height: 100dvh;
}

#betArea {
  display: flex;
  justify-content: center;
  align-items: flex-end;
  height: 180px;
  gap: 30px;
}

#handChips {
  height: 180px;
  background: #06271f;
  display: flex;
  justify-content: center;
  align-items: flex-end;
  gap: 30px;
  padding-bottom: 10px;
}

.stack {
  position: relative;
  width: 80px;
  height: 100%;
  touch-action: none;
}

.chip {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  cursor: pointer;
  background-size: 100%;
  position: absolute;
  left: 0;
}

.extra-chips{
  position: absolute;
  padding: 5px;
  background-color: #636363c1;
  border: 2px solid #fff;
  border-radius: 10px;
  color: #fff;
  font-weight: bold;
  right: 0;
  bottom: 0;
}

.dragging-chip{
  position: absolute;
  width: 80px;
  height: 80px;
  background-size: 100%;
  opacity: 0.5;
}

.highlight{
  outline: 3px solid #fff;
  border-radius: 10px;
}

.addAmount{
  position: absolute;
  top: 0;
  font-weight: bold;
}

.spacer{
  flex: 1;
}

.c500{background-image: url(images/chip_500.png);}
.c100{background-image: url(images/chip_100.png);}
.c50 {background-image: url(images/chip_50.png);}
.c25 {background-image: url(images/chip_25.png);}
</style>
</head>
<body>

<div id="setup">
  <h1>チップ管理システム v1.04</h1>
  <p>チップ総量</p>
  <input type="number" id="totalChips" value="1000">
  <p>SB</p>
  <input type="number" id="sb" value="25">
  <p>BB</p>
  <input type="number" id="bb" value="50">
  <br>
  <button onclick="startGame()">開始</button>
</div>

<div id="game" style="display:none;">
  <div class="spacer"></div>
  <div id="betArea"></div>

  <button id="confirmBtn" onclick="confirmBet()">Confirm</button>

  <div id="handChips"></div>
</div>

<script>
const hand = document.getElementById("handChips");
const betArea = document.getElementById("betArea");
let chips = {500:0,100:0,50:0,25:0};
let bet = {500:0,100:0,50:0,25:0};
const maxStack = 15;
let locked = false;
let dragFrom = null;
let dragVisual;

function distribute(total) {
  let result = {500:0,100:0,50:0,25:0};
  let currentTotal = total;
  const arrKeys = Object.keys(result)
  // 25~500に分配し続ける
  while (currentTotal>arrKeys[0]){
    for (let i = 0;i < arrKeys.length;i++){
      const currentChip = arrKeys[i];
      if (currentTotal - currentChip >= 0){
        currentTotal -= currentChip;
        result[currentChip]++
      }
    }
  }
  return result;
}

function exchange(from,to){
  from = Number(from);
  to = Number(to);
  if (from>to && chips[from]>0){
    chips[from]--;
    chips[to] += from/to;
  }else if (to>from && to/from <= chips[from]){
    chips[from] -= to/from;
    chips[to]++;
  }else return;
}

function startGame() {
  const total = parseInt(document.getElementById("totalChips").value);
  chips = distribute(total);

  document.getElementById("setup").style.display = "none"; // 完全非表示
  document.getElementById("game").style.display = "";

  render();
}

function createChip(value, index, count, location) {
  const chip = document.createElement("div");
  chip.className = `chip c${value}`;

  // 下から積み上げる
  chip.style.bottom = `${index * 5}px`;

  return chip;
}

function createStack(value, count, location) {
  const stack = document.createElement("div");
  stack.className = "stack";
  stack.dataset.value = value;
  stack.dataset.location = location;
  for (let i = 0; i < count; i++) {
    if (i<maxStack){
      stack.appendChild(createChip(value, i, count, location));
    }else{
      const extra = document.createElement("p");
      extra.className = "extra-chips";
      extra.textContent = "+"+ (count-i);
      stack.appendChild(extra);
      break;
    }
  }
  stack.addEventListener("pointerdown",(e)=>{
    if (stack.children.length === 0)return
    dragFrom = stack;

    dragVisual = document.createElement("div");
    dragVisual.className = `dragging-chip c${value}`;
    document.body.appendChild(dragVisual);

    //チップのドロップ先判定
    const stacks = hand.querySelectorAll(".stack");
    if (stack.dataset.location === "hand"){
      betArea.classList.add("highlight")
      for (const chipStack of stacks){;
        const stackVal = Number(chipStack.dataset.value);
        if (value !== stackVal){
          const addAmount = document.createElement("p")
          addAmount.className = "addAmount";
          if (value/stackVal >= 1){
            chipStack.classList.add("highlight")
            addAmount.textContent = "+"+value/stackVal;
          }else if(value*count >= stackVal){
            chipStack.classList.add("highlight");
            addAmount.textContent = "+"+1;
          }
          chipStack.appendChild(addAmount)
        }
      }
    }else if(stack.dataset.location === "bet"){
      for (const chipStack of stacks){
        if (value === Number(chipStack.dataset.value)){
          console.log("bet3")
          chipStack.classList.add("highlight")
        }
      }
    }
    
    moveVisual(e);
  });
  return stack;
}
document.addEventListener("pointermove",(e)=>{
  if (!dragFrom)return
  moveVisual(e);
})
function moveVisual(e){
  dragVisual.style.left = e.clientX + "px";
  dragVisual.style.top = e.clientY + "px";
}
document.addEventListener("pointerup",(e)=>{
  if (dragFrom){
    if (dragVisual)dragVisual.remove();
    betArea.classList.remove("highlight")
    const el = document.elementFromPoint(e.clientX, e.clientY);
    const target = el?.closest(".stack");
    const dragData = dragFrom.dataset;
    if (target){
      const targetData = target.dataset;
      if (dragFrom.dataset.value === target.dataset.value)moveChip(dragData.value,dragData.location)
      else if (dragData.location==="hand" && targetData.location === "hand")exchange(dragData.value,targetData.value);
    }else if (el?.closest("#betArea")){
      moveChip(dragData.value,dragData.location)
    }
  }
  dragFrom = null;
  render();
})

function moveChip(value,location){
  if (locked) return;
  if (location === "hand" && chips[value] > 0) {
    chips[value]--;
    bet[value]++;
  } else if (location === "bet" && bet[value] > 0) {
    bet[value]--;
    chips[value]++;
  }
}

function render() {

  hand.innerHTML = "";
  betArea.innerHTML = "";

  [500,100,50,25].forEach(v => {
    // if (chips[v] > 0) 
    hand.appendChild(createStack(v, chips[v], "hand"));
    if (bet[v] > 0) betArea.appendChild(createStack(v, bet[v], "bet"));
  });
}

function confirmBet() {
  locked = true;
}

// スワイプ禁止
// document.addEventListener("touchmove",(e)=>{
//   e.preventDefault();
// },{passive:false})
document.addEventListener("dblclick",(e)=>{
  e.preventDefault();
})
</script>

</body>
</html>
